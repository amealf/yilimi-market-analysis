name: Update site

on:
  workflow_dispatch:
  schedule:
    # Beijing time: 00:17, 05:17, 10:17, 15:17, 20:17.
    - cron: "17 2,7,12,16,21 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build static site
        run: python scripts/build_site.py --all

      - name: Persist global rates cache
        run: |
          if [ -d data/global_30y_bond_intraday ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/global_30y_bond_intraday
            if ! git diff --cached --quiet; then
              git commit -m "Update global 30Y intraday cache [skip ci]"
              git push
            fi
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
