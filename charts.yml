site:
  title: Yilimi Market Analysis
  description: 跟踪 A 股融资余额、BTC/ETH 价格、稳定币发行量、BTC日内主动成交、韩国信用交易融资余额和全球30Y国债收益率。

categories:
  - id: a-share-margin
    title: A股融资融券
    description: 跟踪 A 股融资余额，并与中证500、创业板指走势对照。
  - id: crypto-liquidity
    title: 加密市场流动性
    description: 跟踪 BTC 价格与 USDT 净增速度多空指标。
  - id: intraday-analysis
    title: 日内分析
    description: 跟踪 BTC 日内价格、主动成交和短周期资金压力。
  - id: other-markets
    title: 其他市场
    description: 跟踪韩国信用交易融资余额、KOSPI、外国人净买入、韩国10年国债收益率、USD/KRW和原油价格走势。
  - id: global-rates
    title: 宏观观察
    description: 跟踪美国、日本、韩国、英国30Y国债收益率日内变化，并跟踪美国、日本、韩国、英国、中国大陆30Y日线历史。

charts:
  - id: margin-csi500
    category: a-share-margin
    title: A股融资余额 与 中证500、创业板指
    description: ""
    builder: margin_csi500
    module: plot_margin_csi500
    output_html: charts/a-share-margin/margin-csi500.html
    output_csv: data/a-share-margin/margin-csi500.csv
  - id: usdt-speed-indicator
    category: crypto-liquidity
    title: USDT发行量 与 BTC/ETH
    description: ""
    builder: usdt_speed_indicator
    module: plot_crypto_liquidity
    output_html: charts/crypto-liquidity/usdt-speed-indicator.html
    output_csv: data/crypto-liquidity/usdt-speed-indicator.csv
  - id: btc-intraday-flow
    category: intraday-analysis
    title: BTC 日内主动成交与价格
    description: Binance BTCUSDT 1分钟历史，默认显示最近24小时；可切换2到5天连续行情和1m、5m、15m、30m、1h周期。
    builder: btc_intraday_flow
    module: plot_btc_intraday_flow
    output_html: charts/intraday-analysis/btc-intraday-flow.html
    output_csv: data/intraday-analysis/btc-intraday-flow.csv
  - id: korea-margin-kospi
    category: other-markets
    title: KOSPI & Cash flow
    description: KOSPI、韩国信用交易融资余额、外国人净买入、韩国10年国债收益率和USD/KRW的对比图。
    builder: korea_margin_kospi
    module: plot_korea_margin_kospi
    output_html: charts/other-markets/korea-margin-kospi.html
    output_csv: data/other-markets/korea-margin-kospi.csv
  - id: hsi-net-flow
    category: other-markets
    title: HSI K线与累计净买入
    description: HSI K线、累计净买入、BSA净买入、连续单净买入、大单净买入和总买卖量。
    builder: static_html
    source_html: static/other-markets/hsi-net-flow.html
    source_csv: static/other-markets/hsi-net-flow.csv
    output_html: charts/other-markets/hsi-net-flow.html
    output_csv: data/other-markets/hsi-net-flow.csv
    password_gate:
      password: yilimi
      view_html: charts/other-markets/hsi-net-flow-view.html
    metrics:
      - label: 市场
        value: HSI
      - label: 默认周期
        value: 周线
  - id: oil-price-events
    category: other-markets
    title: Brent 原油价格与事件
    description: ICE Brent 连续合约K线，数据从2023-01-01开始，默认显示2026-01-01以后；周末和无交易日保留空白，方便标注事件。
    builder: oil_price_events
    module: plot_oil_price_events
    output_html: charts/other-markets/oil-price-events.html
    output_csv: data/other-markets/oil-price-events.csv
  - id: global-30y-bond-intraday
    category: global-rates
    title: Global 30Y Sovereign Yield Intraday Moves
    description: UTC+0日内分钟级30Y国债收益率变化；CSV数据缺失时不补造。
    builder: global_30y_bond_intraday
    module: global_30y_bond_intraday.cli
    output_html: charts/global-rates/global-30y-bond-intraday.html
    output_csv: data/global-rates/global-30y-bond-intraday.csv
  - id: global-30y-bond-daily-history
    category: global-rates
    title: Global 30Y Sovereign Yield Daily History
    description: 美国、日本、韩国、英国、中国大陆30Y国债收益率日线历史；周末从横轴隐藏。
    builder: global_30y_bond_daily
    module: global_30y_bond_daily.cli
    output_html: charts/global-rates/global-30y-bond-daily-history.html
    output_csv: data/global-rates/global-30y-bond-daily-history.csv
